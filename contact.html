<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Elena Vogler</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --border: 1px solid #111; --blue: #0000ff; }
  body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #fff; color: #111; }
  nav { height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-bottom: var(--border); position: sticky; top: 0; z-index: 100; background: #fff; }
  nav .name { font-size: 13px; font-weight: 700; color: #111; text-decoration: none; }
  nav .subtitle { font-size: 12px; color: #999; letter-spacing: 0.05em; text-transform: uppercase; }
  nav .nav-right { display: flex; gap: 20px; }
  nav a { font-size: 13px; font-weight: 600; text-decoration: none; color: var(--blue); }
  .contact-inner { display: grid; grid-template-columns: 1fr 1fr; border-bottom: var(--border); min-height: calc(100vh - 100px); }
  .contact-left { padding: 80px 48px; border-right: var(--border); display: flex; flex-direction: column; justify-content: flex-end; }
  .contact-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--blue); margin-bottom: 20px; }
  .contact-headline { font-size: clamp(40px, 7vw, 90px); font-weight: 800; letter-spacing: -0.04em; line-height: 0.9; }
  .contact-right { padding: 80px 48px; display: flex; flex-direction: column; justify-content: flex-end; }
  .contact-email { font-size: 18px; font-weight: 700; color: #111; text-decoration: none; border-bottom: var(--border); padding-bottom: 4px; display: inline-block; margin-bottom: 40px; }
  .contact-email:hover { color: var(--blue); }
  .links-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #999; margin-bottom: 16px; }
  .social-links { display: flex; flex-direction: column; gap: 12px; }
  .social-links a { font-size: 15px; font-weight: 700; color: #111; text-decoration: none; letter-spacing: -0.01em; }
  .social-links a:hover { color: var(--blue); }
  footer { height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-top: var(--border); }
  footer span { font-size: 12px; color: #999; }
  footer a { font-size: 12px; font-weight: 600; color: var(--blue); text-decoration: none; }
  @media (max-width: 700px) {
    nav .subtitle { display: none; }
    .contact-inner { grid-template-columns: 1fr; min-height: auto; }
    .contact-left { border-right: none; border-bottom: var(--border); padding: 60px 24px; }
    .contact-right { padding: 48px 24px 60px; }
    footer span:nth-child(2) { display: none; }
  }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="name">Elena Vogler</a>
  <span class="subtitle">Motion & Exhibition Design</span>
  <div class="nav-right">
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>
<div class="contact-inner">
  <div class="contact-left">
    <p class="contact-label">Contact</p>
    <h1 class="contact-headline">Let's<br>talk.</h1>
  </div>
  <div class="contact-right">
    <a href="mailto:Vogler.elena@gmx.de" class="contact-email">Vogler.elena@gmx.de</a>
    <p class="links-label">Find me here</p>
    <div class="social-links">
      <a href="https://vimeo.com/elenavogler" target="_blank">Vimeo ↗</a>
      <a href="https://www.instagram.com/" target="_blank">Instagram ↗</a>
      <a href="https://www.linkedin.com/" target="_blank">LinkedIn ↗</a>
    </div>
  </div>
</div>
<footer>
  <span>Graz · 2025</span>
  <span>Motion Design · Exhibition Design</span>
  <a href="index.html">← Back to projects</a>
</footer>
</body>
</html>
